<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clawGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD23F;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 龙虾形状 -->
  <g transform="translate(100,100)">
    <!-- 身体 -->
    <ellipse cx="0" cy="0" rx="45" ry="35" fill="url(#clawGradient)" filter="url(#shadow)"/>
    
    <!-- 头部 -->
    <ellipse cx="-25" cy="-5" rx="30" ry="25" fill="url(#clawGradient)"/>
    
    <!-- 眼睛 -->
    <circle cx="-40" cy="-15" r="5" fill="#000"/>
    <circle cx="-40" cy="-15" r="2" fill="#fff"/>
    <circle cx="-35" cy="-12" r="5" fill="#000"/>
    <circle cx="-35" cy="-12" r="2" fill="#fff"/>
    
    <!-- 大钳子 -->
    <path d="M 20 -20 Q 45 -35 50 -20 L 55 -15 Q 60 -10 55 -5 L 50 0 Q 45 5 40 0 L 35 -5 Q 30 -10 25 -15 Z" 
          fill="#FF6B35" stroke="#E55100" stroke-width="2"/>
    
    <path d="M 20 20 Q 45 35 50 20 L 55 15 Q 60 10 55 5 L 50 0 Q 45 -5 40 0 L 35 5 Q 30 10 25 15 Z" 
          fill="#FF6B35" stroke="#E55100" stroke-width="2"/>
    
    <!-- 小钳子 -->
    <path d="M -45 -15 Q -60 -25 -65 -15 L -70 -10 Q -75 -5 -70 0 L -65 5 Q -60 10 -55 5 L -50 0 Q -45 -5 -45 -10 Z" 
          fill="#F7931E" stroke="#E55100" stroke-width="1.5"/>
    
    <path d="M -45 15 Q -60 25 -65 15 L -70 10 Q -75 5 -70 0 L -65 -5 Q -60 -10 -55 -5 L -50 0 Q -45 5 -45 10 Z" 
          fill="#F7931E" stroke="#E55100" stroke-width="1.5"/>
    
    <!-- 触角 -->
    <path d="M -50 -25 Q -65 -35 -70 -45" stroke="#FF6B35" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M -45 -30 Q -60 -40 -65 -50" stroke="#FF6B35" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- 腿 -->
    <path d="M -15 30 Q -25 40 -30 50" stroke="#F7931E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 0 35 Q -5 45 -10 55" stroke="#F7931E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 15 30 Q 25 40 30 50" stroke="#F7931E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M -15 -30 Q -25 -40 -30 -50" stroke="#F7931E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 0 -35 Q 5 -45 10 -55" stroke="#F7931E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 15 -30 Q 25 -40 30 -50" stroke="#F7931E" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- 文字 -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">OpenClaw</text>
</svg>